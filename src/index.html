<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>PCEP Practice Quiz</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link
		href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
		rel="stylesheet" />
	<link rel="stylesheet" href="styles.css" />
</head>

<body>

	<header>
		<div class="header-inner">
			<div class="logo">
				<span class="logo-icon">🐍</span>
				<div class="logo-text">
					<h1>PCEP Practice</h1>
					<p>Certified Entry-Level Python Programmer</p>
				</div>
			</div>
			<div class="header-controls">
				<div class="mode-toggle" role="group" aria-label="View mode">
					<button class="mode-btn active" data-mode="single">One at a time</button>
					<button class="mode-btn" data-mode="list">All questions</button>
				</div>
				<div class="score-pill" id="scorePill" aria-live="polite">
					<span id="scoreCorrect">0</span>/<span id="scoreAnswered">0</span>
					<span class="score-label">correct</span>
				</div>
			</div>
		</div>
	</header>

	<main id="app">
		<div class="loading-state" id="loadingState">
			<div class="spinner"></div>
			<p>Loading questions…</p>
		</div>
	</main>

	<script src="index.js"></script>
</body>

</html>
